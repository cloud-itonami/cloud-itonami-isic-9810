name: ci

# Kept correct and ready for when Actions are enabled on the org.
# Until then: run locally with `clojure -M:lint` and `clojure -M:dev:test`.
#
# Workspace layout: deps use :local/root to kotoba-lang/langgraph and
# kotoba-lang/langchain (public). CI reconstructs sibling paths.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-9810 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (advisor · governor · phase · store parity)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-9810
        run: clojure -M:dev:test
